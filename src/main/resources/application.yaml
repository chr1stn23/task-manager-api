spring:
  application:
    name: task_manager
  datasource:
    url: jdbc:postgresql://localhost:5432/taskdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:900000}

refresh-token:
  expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:7}

admin:
  email: ${ADMIN_EMAIL}
  password: ${ADMIN_PASSWORD}